<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>RFID Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: #f3f4f6;
        }

        .container {
            max-width: 960px;
            margin: 48px auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            padding: 32px;
        }

        h2 {
            text-align: center;
            margin-bottom: 24px;
        }

        .status {
            text-align: center;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 8px;
            background: gray;
        }

        .dot.connected {
            background: #16a34a;
        }

        .dot.failed {
            background: #dc2626;
        }

        .card-box {
            background: #f9fafb;
            border-radius: 10px;
            padding: 28px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 18px;
        }

        hr {
            border: none;
            border-top: 1px solid #e5e7eb;
            margin: 24px 0;
        }

        .manual-section {
            text-align: center;
        }

        input {
            padding: 10px 12px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            width: 260px;
        }

        button {
            padding: 10px 18px;
            border-radius: 6px;
            border: none;
            background: #0ea5e9;
            color: white;
            cursor: pointer;
            margin-left: 8px;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .manual-status {
            margin-top: 12px;
            font-size: 14px;
        }

        .fade {
            transition: all 0.2s ease;
        }
    </style>
</head>

<body>
<div class="container">
    <h2>RFID Monitor</h2>

    <div class="status">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">Connecting...</span>
    </div>

    <div id="card" class="card-box fade">
        Latest RFID Code
    </div>

    <hr />

    <div class="manual-section">
        <h3>Manual Test</h3>
        <input id="manualCardInput" type="text" placeholder="Enter RFID" />
        <button id="manualSendBtn" type="button">Send</button>
        <div id="manualStatus" class="manual-status"></div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const defaultHubUrl = `${window.location.origin}/rfidHub`;
    const defaultManualUrl = `${window.location.origin}/api/rfid/manual`;
    const hubUrl = params.get("hubUrl") || defaultHubUrl;
    const manualUrl = params.get("manualUrl") || defaultManualUrl;
    const manualAuthToken = params.get("token");

    const statusTextEl = document.getElementById("statusText");
    const statusDotEl = document.getElementById("statusDot");
    const cardEl = document.getElementById("card");
    const manualStatusEl = document.getElementById("manualStatus");
    const manualCardInputEl = document.getElementById("manualCardInput");
    const manualSendBtnEl = document.getElementById("manualSendBtn");

    function getRequestHeaders() {
        const headers = { "Content-Type": "application/json" };
        if (manualAuthToken) {
            headers.Authorization = manualAuthToken.startsWith("Bearer ")
                ? manualAuthToken
                : "Bearer " + manualAuthToken;
        }
        return headers;
    }

    async function postCardToMrs(cardNumber) {
        const response = await fetch(manualUrl, {
            method: "POST",
            headers: getRequestHeaders(),
            credentials: "include",
            body: JSON.stringify({ cardNumber: cardNumber })
        });

        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
            throw new Error(payload.message || response.status);
        }
        return payload;
    }

    async function sendManualCard() {
        const cardNumber = manualCardInputEl.value.trim();
        if (!cardNumber) {
            manualStatusEl.innerText = "Please enter card number";
            return;
        }

        manualSendBtnEl.disabled = true;
        manualStatusEl.innerText = "Sending...";

        try {
            const payload = await postCardToMrs(cardNumber);
            const sentTag = payload.cardNumber || cardNumber;
            manualStatusEl.innerText = "Sent: " + sentTag;
            manualCardInputEl.value = "";
        } catch (err) {
            manualStatusEl.innerText = "Failed: " + err.message;
        } finally {
            manualSendBtnEl.disabled = false;
        }
    }

    async function startConnection() {
        const connection = new signalR.HubConnectionBuilder()
            .withUrl(hubUrl)
            .withAutomaticReconnect()
            .build();

        connection.on("CardDetected", function (cardNumber) {
            cardEl.style.opacity = 0;
            setTimeout(() => {
                cardEl.innerText = "Last card: " + cardNumber;
                cardEl.style.opacity = 1;
            }, 120);
        });

        try {
            statusTextEl.innerText = "Connecting...";
            await connection.start();
            statusTextEl.innerText = "Connected";
            statusDotEl.classList.add("connected");
            statusDotEl.classList.remove("failed");
        } catch {
            statusTextEl.innerText = "Failed";
            statusDotEl.classList.add("failed");
            statusDotEl.classList.remove("connected");
        }
    }

    manualSendBtnEl.addEventListener("click", sendManualCard);
    manualCardInputEl.addEventListener("keydown", function (e) {
        if (e.key === "Enter") sendManualCard();
    });

    startConnection();
</script>
</body>
</html>
